<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap">
</head>
<body>
  <header class="title-bar">
    <div class="title-bar-content">
      <h1 class="app-title"></h1>
      <button class="menu-button" id="menuButton" aria-label="メニューを開く">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="main-content">
    <div class="paper-container">
      <div class="paper" id="paper">
        <div 
          class="editor" 
          id="editor" 
          contenteditable="true" 
          spellcheck="true"
          data-placeholder="Write begins..."
        ></div>
      </div>
    </div>
  </main>

  <div class="settings-drawer" id="settingsDrawer">
    <div class="settings-header">
      <h2>Settings</h2>
      <button class="close-button" id="closeButton" aria-label="Close settings">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    
    <div class="settings-content">
      <div class="setting-group">
        <label for="fontSelect">Font</label>
        <select id="fontSelect" class="setting-control">
          <option value="serif">Serif (明朝体)</option>
          <option value="sans-serif">Sans-serif (ゴシック体)</option>
          <option value="monospace">Monospace (等幅)</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="lineHeightRange">
          Line&nbsp;Height: <span id="lineHeightValue">1.6</span>
        </label>
        <input 
          type="range" 
          id="lineHeightRange" 
          class="setting-control" 
          min="0.8" 
          max="2.0" 
          step="0.1" 
          value="1.6"
        >
      </div>

      <div class="setting-group">
        <label for="fontSizeRange">
          Font&nbsp;Size: <span id="fontSizeValue">16px</span>
        </label>
        <input 
          type="range" 
          id="fontSizeRange" 
          class="setting-control" 
          min="12" 
          max="24" 
          step="1" 
          value="16"
        >
      </div>

      <div class="setting-group">
        <label for="widthRange">
          Width: <span id="widthValue">700px</span>
        </label>
        <input 
          type="range" 
          id="widthRange" 
          class="setting-control" 
          min="400" 
          max="1200" 
          step="10" 
          value="700"
        >
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>

  <div class="link-dialog" id="linkDialog">
    <div class="link-dialog-content">
      <h3>リンクを追加</h3>
      <input type="url" id="linkUrl" placeholder="https://example.com" autocomplete="off">
      <div class="link-dialog-actions">
        <button id="linkCancel">キャンセル</button>
        <button id="linkRemove" style="display:none">削除</button>
        <button id="linkOk">OK</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
